<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>
</head>
<body>
    <input type="text" id="email" value="aferrerj@uninorte.edu.co"> 
    <input type="text" id="password" value="Brisaylupe4-">

    <button onclick="login()">Login</button>
    <button onclick="auth()">Auth</button>

    <button onclick="accessLevel(event)">admin</button>
    <button onclick="accessLevel(event)">professor</button>
    <button onclick="accessLevel(event)">student</button>
    
</body>
<script>
    async function login() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        
        const res = await fetch("http://localhost:3000/test-login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const accessToken = await res.json();
        console.log(accessToken)
        window.accessToken = accessToken.accessToken
    }

    async function auth() {
        console.log("Received: " + window.accessToken )
        const res = await fetch("http://localhost:3000/test-auth", {
            method: "GET",
            headers: {
                Authorization: "Bearer " + window.accessToken  
            },
        });
        console.log( await res.json())
    }

    async function accessLevel(event) {
        const role = event.target.innerText; 

        console.log(`Testing entry to ${role} page`)
        
        const res = await fetch(`http://localhost:3000/test-${role}-level`, {
            method: "GET",
            headers: {
                Authorization: "Bearer " + window.accessToken  
            }
        });
                
        console.log( await res.json())

    }
</script>
</html>
