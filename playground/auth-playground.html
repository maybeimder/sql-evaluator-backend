<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Playground</title>
</head>

<body>
    <h1>Auth Playground</h1>

    <h3>Registro</h3>
    <input type="email" id="regEmail" placeholder="email">
    <input type="text" id="regName" placeholder="nombre">
    <input type="password" id="regPass" placeholder="contraseña">
    <input type="number" id="regCode" placeholder="codigo academico">
    <button onclick="registerUser()">Registrar</button>

    <h3>Verificar Email</h3>
    <input type="email" id="verEmail" placeholder="email">
    <input type="text" id="verCode" placeholder="código recibido">
    <button onclick="verifyEmail()">Verificar</button>

    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="email">
    <input type="password" id="loginPass" placeholder="contraseña">
    <button onclick="loginUser()">Login</button>

    <h3>Sesión</h3>
    <button onclick="logoutUser()">Logout</button>
    <button onclick="refreshToken()">Refrescar Token</button>
    <button onclick="showStatus()">Mostrar Estado</button>

    <h3>Endpoints Protegidos</h3>
    <button onclick="testProtected('/test-auth')">Test Auth</button>
    <button onclick="testProtected('/test-admin-level')">ADMIN</button>
    <button onclick="testProtected('/test-professor-level')">PROFESSOR</button>
    <button onclick="testProtected('/test-student-level')">STUDENT</button>

    <h3>Resultados</h3>
    <textarea id="output" style="width:100%;height:250px;"></textarea>

</body>

<script>
const API = "http://localhost:3000/auth";
window.accessToken = null;

function log(o) {
    document.getElementById("output").value = 
        JSON.stringify(o, null, 2);
}

async function doFetch(url, method="POST", body=null, auth=false) {
    const config = {
        method,
        headers: { "Content-Type": "application/json" },
        credentials: "include",
    };

    if (body) config.body = JSON.stringify(body);
    if (auth && window.accessToken)
        config.headers["Authorization"] = "Bearer " + window.accessToken;

    const res = await fetch(url, config);
    return res.json();
}

/* ----------------------------- */
/*        AUTH FUNCTIONS         */
/* ----------------------------- */

async function registerUser() {
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPass").value;
    const name = document.getElementById("regName").value;
    const code = document.getElementById("regCode").value;

    const out = await doFetch(API + "/register", "POST", {
        email, password, name, code
    });

    log(out);
}

async function verifyEmail() {
    const email = document.getElementById("verEmail").value;
    const code = document.getElementById("verCode").value;

    const out = await doFetch(API + "/verify", "POST", {
        email, code
    });

    log(out);
}

async function loginUser() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPass").value;

    const out = await doFetch(API + "/login", "POST", {
        email, password
    });

    window.accessToken = out.accessToken ?? null;

    log(out);
}

async function logoutUser() {
    const out = await doFetch(API + "/logout", "POST");
    window.accessToken = null;
    log(out);
}

async function refreshToken() {
    const out = await doFetch(API + "/refresh-token", "POST");
    if (out.accessToken) window.accessToken = out.accessToken;
    log(out);
}

/* ----------------------------- */
/*    PROTECTED ROUTES TEST      */
/* ----------------------------- */
async function testProtected(route) {
    const out = await doFetch(
        "http://localhost:3000" + route, 
        "GET",
        null,
        true
    );

    log(out);
}

/* ----------------------------- */
/*       SESSION STATUS          */
/* ----------------------------- */
async function showStatus() {
    log({
        accessToken: window.accessToken,
        cookies: document.cookie || "(HTTPOnly, no visible)",
    });
}

</script>
</html>
