<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments Playground</title>
</head>

<body>
    <h1>Assignments Playground</h1>

    <!-- ========================= -->
    <!-- LOGIN & TOKENS (NECESARIO) -->
    <!-- ========================= -->
    <h2>🔐 Autenticación</h2>

    <input type="email" id="loginEmail" placeholder="email">
    <input type="password" id="loginPass" placeholder="contraseña">
    <button onclick="loginUser()">Login</button>

    <button onclick="refreshToken()">Refrescar Token</button>

    <h3>Estado</h3>
    <button onclick="showStatus()">Mostrar Estado</button>


    <!-- ========================= -->
    <!-- EXAMS -->
    <!-- ========================= -->
    <h2>📘 Exámenes</h2>

    <h3>Crear examen</h3>
    <input type="text" id="examName" placeholder="Nombre del examen">
    <button onclick="createExam()">Crear Examen</button>

    <h3>Listar exámenes</h3>
    <button onclick="listExams()">Listar</button>


    <!-- ========================= -->
    <!-- QUESTIONS -->
    <!-- ========================= -->
    <h2>❓ Preguntas</h2>

    <h3>Registrar pregunta</h3>
    <input type="text" id="qExamID" placeholder="ExamID">
    <textarea id="qText" placeholder="Texto de la pregunta"></textarea>
    <button onclick="createQuestion()">Registrar</button>

    <h3>Listar preguntas</h3>
    <input type="text" id="qListExamID" placeholder="ExamID">
    <button onclick="listQuestions()">Listar por examen</button>


    <!-- ========================= -->
    <!-- ASSIGNMENTS -->
    <!-- ========================= -->
    <h2>📝 Assignments</h2>

    <h3>Crear Assignment</h3>
    <input type="text" id="aExamID" placeholder="ExamID">
    <button onclick="createAssignment()">Crear Assignment</button>

    <h3>Obtener Assignment</h3>
    <input type="text" id="aID" placeholder="AssignmentID">
    <button onclick="getAssignment()">Buscar</button>


    <!-- ========================= -->
    <!-- OUTPUT -->
    <!-- ========================= -->
    <h2>Resultado</h2>
    <textarea id="output" style="width:100%;height:300px;"></textarea>

</body>

<script>
const API = "http://localhost:3000";
window.accessToken = null;

function log(o) {
    document.getElementById("output").value =
        JSON.stringify(o, null, 2);
}

async function apiFetch(route, method="POST", body=null, auth=true) {
    const config = {
        method,
        headers: { "Content-Type": "application/json" },
        credentials: "include",
    };

    if (body) config.body = JSON.stringify(body);
    if (auth && window.accessToken)
        config.headers["Authorization"] = "Bearer " + window.accessToken;

    const res = await fetch(API + route, config);
    return res.json();
}

/* ================================ */
/*             AUTH                 */
/* ================================ */

async function loginUser() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPass").value;

    const out = await apiFetch("/auth/login", "POST", {
        email, password
    });

    window.accessToken = out.accessToken ?? null;
    log(out);
}

async function refreshToken() {
    const out = await apiFetch("/auth/refresh-token", "POST", null, false);
    if (out.accessToken) window.accessToken = out.accessToken;
    log(out);
}

function showStatus() {
    log({
        accessToken: window.accessToken,
        cookies: document.cookie || "(HTTPOnly)"
    });
}

/* ================================ */
/*            EXAMS                 */
/* ================================ */

async function createExam() {
    const name = document.getElementById("examName").value;

    const out = await apiFetch("/exams", "POST", { name });
    log(out);
}

async function listExams() {
    const out = await apiFetch("/exams", "GET", null , true);
    log(out);
}

/* ================================ */
/*           QUESTIONS              */
/* ================================ */

async function createQuestion() {
    const examID = document.getElementById("qExamID").value;
    const text = document.getElementById("qText").value;

    const out = await apiFetch(`/questions/${examID}`, "POST", {
        text
    });

    log(out);
}

async function listQuestions() {
    const examID = document.getElementById("qListExamID").value;

    const out = await apiFetch(`/questions/${examID}`, "GET");
    log(out);
}

/* ================================ */
/*           ASSIGNMENTS            */
/* ================================ */

async function createAssignment() {
    const examID = document.getElementById("aExamID").value;

    const out = await apiFetch(`/assignments`, "POST", {
        examID
    });

    log(out);
}

async function getAssignment() {
    const assignmentID = document.getElementById("aID").value;

    const out = await apiFetch(`/assignments/${assignmentID}`, "GET");
    log(out);
}

</script>
</html>
